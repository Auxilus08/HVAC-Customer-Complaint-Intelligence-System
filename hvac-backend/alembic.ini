[alembic]
# Path to migration scripts
script_location = alembic

# Template for generated migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with this directory for imports
prepend_sys_path = .

# Truncate long slugs in filenames
truncate_slug_length = 40

# sqlalchemy.url is set dynamically in alembic/env.py from DATABASE_SYNC_URL env var.
# Do NOT hardcode credentials here.
sqlalchemy.url =

[post_write_hooks]
# Hook to auto-format generated migration files
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = %(here)s/.venv/bin/ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
